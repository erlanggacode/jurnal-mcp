name: Build and Deploy

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/jurnal-mcp:latest
            ${{ secrets.DOCKER_USERNAME }}/jurnal-mcp:${{ github.sha }}

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/jurnal-mcp:latest

            docker stop jurnal-mcp || true
            docker rm jurnal-mcp || true

            docker run -d \
              --name jurnal-mcp \
              --restart unless-stopped \
              -p 0.0.0.0:3000:3000 \
              -e JURNAL_CLIENT_ID="${{ secrets.JURNAL_CLIENT_ID }}" \
              -e JURNAL_CLIENT_SECRET="${{ secrets.JURNAL_CLIENT_SECRET }}" \
              -e MCP_PORT="3000" \
              ${{ secrets.DOCKER_USERNAME }}/jurnal-mcp:latest

            docker image prune -f
